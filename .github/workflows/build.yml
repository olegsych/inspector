name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  Configuration: Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: dotnet build Inspector.sln
      - run: dotnet test --no-build tst/Tests.csproj
      - run: dotnet pack --no-build src/Inspector.csproj
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: bin/Release/*.*nupkg
      - run: |
          dir bin/Release/*.*nupkg |
          %{ dotnet nuget push $_ --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate }
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
